name: private-cloud-gateway

# Production deployment for Oracle Cloud Ubuntu VM.
# Usage: docker compose -f infra/docker/docker-compose.prod.yml up -d
#
# Required environment variables (set in /opt/pcg/.env):
#   CLOUD_CORE_SESSION_SECRET   — generate: openssl rand -hex 32
#   CLOUD_CORE_ADMIN_EMAIL      — Let's Encrypt notifications
#   CLOUD_CORE_COOKIE_DOMAIN    — your root domain (e.g. nathan.me)
#   CLOUD_CORE_LOGIN_URL        — https://home.your-domain.com/login

services:

  # ── Caddy ─────────────────────────────────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"    # HTTP/3
    volumes:
      - /opt/pcg/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - public
      - private
    depends_on:
      core:
        condition: service_healthy

  # ── Go Core ───────────────────────────────────────────────────────────────
  core:
    image: ghcr.io/nathanwalash/private-cloud-gateway:latest
    # Falls back to building locally if the image is not yet in ghcr.io.
    # Remove the `build:` block after tagging a release.
    build:
      context: /opt/pcg
      dockerfile: Dockerfile
    restart: always
    env_file: /opt/pcg/.env
    environment:
      CLOUD_CORE_ENV: production
    volumes:
      - core_data:/data
      - core_backups:/backups
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/pcg/blueprints:/blueprints:ro
    networks:
      - private
      - public
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    expose:
      - "8080"

networks:
  public:
    driver: bridge
  private:
    name: cloud_core_private
    driver: bridge

volumes:
  caddy_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/pcg/caddy/data
  caddy_config:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/pcg/caddy/config
  core_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/pcg/data
  core_backups:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/pcg/backups
