run:
  timeout: 5m
  working-directory: .

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - gosimple
    - ineffassign
    - unused
    - misspell
    - gosec
    - bodyclose
    - noctx

linters-settings:
  gosec:
    excludes:
      - G304  # file path from variable — acceptable for SQLite path from env

issues:
  exclude-rules:
    - path: "_test.go"
      linters:
        - errcheck
        - gosec
