id: freshrss
name: FreshRSS
description: Self-hosted RSS and Atom feed aggregator. Follow your favourite blogs and news sites without algorithmic filtering.
icon: "📰"
category: productivity

route:
  subdomain: rss
  internal_port: 80

container:
  image: freshrss/freshrss:latest
  environment:
    - TZ=UTC
    - CRON_MIN=1,31
  volumes:
    - pcg-freshrss-data:/var/www/FreshRSS/data
    - pcg-freshrss-extensions:/var/www/FreshRSS/extensions

lifecycle:
  policy: always-on

health:
  path: /
  expected_status: 200
  timeout_seconds: 15

backup:
  enabled: true
  container_paths:
    - /var/www/FreshRSS/data

resources:
  memory_limit: 256m
