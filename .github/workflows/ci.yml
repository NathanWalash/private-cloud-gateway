name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  # ── Repository structure check ────────────────────────────────────────────
  repo-check:
    name: Required files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify required files are present
        run: |
          required=(
            README.md
            ROADMAP.md
            CONTRIBUTING.md
            SECURITY.md
            .gitignore
            .env.example
            Makefile
            docs/dev-local.md
            docs/git-workflow.md
            .github/pull_request_template.md
          )
          missing=()
          for f in "${required[@]}"; do
            if [ ! -f "$f" ]; then
              missing+=("$f")
            fi
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "Missing required files:"
            printf '  %s\n' "${missing[@]}"
            exit 1
          fi
          echo "All required files present."

  # ── Markdown lint ─────────────────────────────────────────────────────────
  markdown-lint:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint markdown files
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: "**/*.md"
          config: ".markdownlint.json"

  # ── Shell script lint ─────────────────────────────────────────────────────
  shellcheck:
    name: Shell script lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck on scripts
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: "./scripts"

  # ── YAML lint ─────────────────────────────────────────────────────────────
  yaml-lint:
    name: YAML lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint YAML files
        run: yamllint -c .yamllint.yml blueprints/ .github/workflows/ infra/docker/

  # ── Go lint ───────────────────────────────────────────────────────────────
  go-lint:
    name: Go lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: apps/core/go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: apps/core

  # ── Go vulnerability scan ─────────────────────────────────────────────────
  go-vuln:
    name: Go vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: golang/govulncheck-action@v1
        with:
          go-version-input: "stable"
          go-package: "./..."
          work-dir: apps/core

  # ── Go Core tests ─────────────────────────────────────────────────────────
  go-test:
    name: Go Core tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: apps/core/go.sum

      - name: Run tests
        run: go test -v -race -count=1 ./...
        working-directory: apps/core

  # ── Node type-check and build ─────────────────────────────────────────────
  node-build:
    name: Web app build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: actions/cache@v4
        with:
          path: apps/web/node_modules
          key: node-${{ hashFiles('apps/web/package.json') }}
          restore-keys: node-

      - name: Install dependencies
        run: npm install --legacy-peer-deps
        working-directory: apps/web

      - name: Type-check and build
        run: npm run build
        working-directory: apps/web

  # ── Full stack build (web + Go) ───────────────────────────────────────────
  # Builds the production Docker image using the root Dockerfile.
  # Requires both web build and Go checks to pass first.
  go-build:
    name: Docker image build
    runs-on: ubuntu-latest
    needs: [go-lint, go-test, node-build]
    steps:
      - uses: actions/checkout@v4

      - name: Build production Docker image
        run: docker build -t pcg:ci .
