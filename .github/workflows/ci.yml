name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  # ── Repository structure check ────────────────────────────────────────────
  repo-check:
    name: Required files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify required files are present
        run: |
          required=(
            README.md
            ROADMAP.md
            CONTRIBUTING.md
            SECURITY.md
            .gitignore
            .env.example
            Makefile
            docs/dev-local.md
            docs/git-workflow.md
            .github/pull_request_template.md
          )
          missing=()
          for f in "${required[@]}"; do
            if [ ! -f "$f" ]; then
              missing+=("$f")
            fi
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "Missing required files:"
            printf '  %s\n' "${missing[@]}"
            exit 1
          fi
          echo "All required files present."

  # ── Markdown lint ─────────────────────────────────────────────────────────
  markdown-lint:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint markdown files
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: "**/*.md"
          config: ".markdownlint.json"

  # ── Shell script lint ─────────────────────────────────────────────────────
  shellcheck:
    name: Shell script lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck on scripts
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: "./scripts"

  # ── YAML lint ─────────────────────────────────────────────────────────────
  yaml-lint:
    name: YAML lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint YAML files
        run: yamllint -c .yamllint.yml blueprints/ .github/workflows/ infra/docker/

  # ── Go Core build ─────────────────────────────────────────────────────────
  # Builds the Docker image for Go Core. This validates the Dockerfile,
  # runs go mod tidy, and compiles the binary — catching any build errors.
  go-build:
    name: Go Core build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Go Core Docker image
        run: docker build -t pcg-core:ci apps/core/

